
version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gayscape
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  server:
    build: ./server
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis

  client:
    build: ./client
    ports:
      - "5173:5173"
